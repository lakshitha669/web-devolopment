<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My first  Shopping Page</title>
  <style>
    :root {
      --dark: #1f2329;
      --yellow: #f8c53a;
      --yellow-deep: #eeb012;
      --light: #f5f5f5;
      --text: #1f1f1f;
      --muted: #6f6f6f;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #efefef;
      color: var(--text);
    }

    .top-bar {
      background: var(--dark);
      color: #ddd;
      padding: 18px 32px;
      display: flex;
      justify-content: center;
      gap: 24px;
      font-size: 14px;
      flex-wrap: wrap;
    }

    .top-bar a {
      color: #e9e9e9;
      text-decoration: none;
    }

    .hero-section {
      min-height: 540px;
      background:
        linear-gradient(rgba(248, 197, 58, 0.72), rgba(248, 197, 58, 0.78)),
        url("https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=1400&q=80") center/cover no-repeat;
      position: relative;
      padding: 14px 6vw 40px;
    }

    .brand {
      text-align: center;
      font-size: 46px;
      color: #fff;
      font-weight: 800;
      letter-spacing: 1px;
      margin: 8px 0 18px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    }

    .search-row {
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 130px 1fr 44px 110px auto;
      gap: 8px;
      align-items: center;
    }

    .menu-btn,
    .category-btn,
    .language-btn,
    .cart-btn,
    .search-btn {
      border: none;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 14px;
      cursor: pointer;
    }

    .menu-btn {
      width: 44px;
      background: #ffffff;
      color: #2a2a2a;
      font-size: 22px;
      line-height: 1;
    }

    .category-btn,
    .language-btn {
      background: #1f2329;
      color: #fff;
      text-align: left;
    }

    .search-input {
      padding: 10px 14px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      min-width: 150px;
    }

    .search-btn {
      background: #f04e23;
      color: #fff;
      font-weight: 700;
      width: 44px;
      padding: 10px 0;
    }

    .cart-btn {
      background: transparent;
      color: #fff;
      font-weight: 700;
      padding: 0;
      text-align: left;
    }

    .search-row-wrap {
      max-width: 1040px;
      margin: 0 auto;
      position: relative;
    }

    .language-btn {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      cursor: pointer;
    }

    .hero-content {
      max-width: 1040px;
      margin: 86px auto 0;
      text-align: center;
      color: #fff;
      position: relative;
    }

    .hero-title {
      font-size: clamp(36px, 6vw, 72px);
      font-weight: 900;
      line-height: 1.06;
      text-transform: uppercase;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.24);
    }

    .cta-btn {
      margin-top: 28px;
      display: inline-block;
      background: #1f2329;
      color: #fff;
      font-weight: 700;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 5px;
    }

    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.8);
      color: #2b2b2b;
      font-size: 18px;
      font-weight: 900;
    }

    .arrow.left {
      left: 20px;
    }

    .arrow.right {
      right: 20px;
    }

    .products {
      background: #efefef;
      padding: 36px 6vw 50px;
    }

    .products h2 {
      text-align: center;
      font-size: clamp(28px, 4vw, 48px);
      margin-bottom: 26px;
      font-weight: 800;
    }

    .card-grid {
      max-width: 1040px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 6px;
      padding: 22px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .card.clickable {
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card.clickable:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.14);
    }

    .card h3 {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .card-image {
      width: 100%;
      height: 260px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 14px;
      display: block;
    }

    .card p {
      color: var(--muted);
      font-size: 18px;
    }

    .card span {
      color: #f04e23;
      font-weight: 700;
    }

    .cart-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 280px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18);
      padding: 14px;
      z-index: 12;
      display: none;
    }

    .cart-panel.open {
      display: block;
    }

    .cart-panel h4 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .cart-items-list {
      list-style: none;
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: #2b2b2b;
    }

    .cart-empty {
      font-size: 14px;
      color: #666;
    }

    .clear-cart-btn {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 6px;
      padding: 10px 12px;
      background: #f04e23;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    @media (max-width: 930px) {
      .search-row {
        grid-template-columns: 44px 1fr 44px;
      }

      .category-btn,
      .language-btn,
      .cart-btn {
        display: none;
      }

      .hero-content {
        margin-top: 60px;
      }
    }

    @media (max-width: 780px) {
      .card-grid {
        grid-template-columns: 1fr;
      }

      .top-bar {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <a id="nav-best-sellers" href="#">Best Sellers</a>
    <a id="nav-gift-ideas" href="#">Gift Ideas</a>
    <a id="nav-new-releases" href="#">New Releases</a>
    <a id="nav-todays-deals" href="#">Today's Deals</a>
    <a id="nav-customer-service" href="#">Customer Service</a>
  </header>

  <section class="hero-section">
    <h1 class="brand">Eflyer</h1>

    <div class="search-row-wrap">
      <div class="search-row">
        <button class="menu-btn" aria-label="Open menu">&#9776;</button>
        <button id="category-btn" class="category-btn">All Category</button>
        <input id="search-input" class="search-input" type="text" placeholder="Search this blog">
        <button class="search-btn" aria-label="Search">&#128269;</button>
        <select id="language-select" class="language-btn" aria-label="Select language">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="de">German</option>
        </select>
        <button id="cart-btn" class="cart-btn">Cart (0)</button>
      </div>
      <div id="cart-panel" class="cart-panel">
        <h4 id="cart-panel-title">Ordered Items</h4>
        <ul id="cart-items-list" class="cart-items-list"></ul>
        <p id="cart-empty" class="cart-empty">Your cart is empty.</p>
        <button id="clear-cart-btn" class="clear-cart-btn" type="button">Clear Cart</button>
      </div>
    </div>

    <div class="hero-content">
      <button class="arrow left" aria-label="Previous slide">&#8249;</button>
      <h2 id="hero-title" class="hero-title">Get Start<br>Your Favorite Shopping</h2>
      <a id="buy-btn" href="#" class="cta-btn">BUY NOW</a>
      <button class="arrow right" aria-label="Next slide">&#8250;</button>
    </div>
  </section>

  <section class="products">
    <h2 id="products-title">Man &amp; Woman Fashion</h2>
    <div class="card-grid">
      <article class="card clickable product-card" data-product-key="product1" title="Click to add to cart">
        <img
          class="card-image"
          src="C:/Users/laksh/.cursor/projects/c-Users-laksh-Downloads-Telegram-Desktop/assets/c__Users_laksh_AppData_Roaming_Cursor_User_workspaceStorage_131e938d741c375358ff56a21e8dd05a_images_Untitled1-33ef54a0-5802-4204-8306-64568f2d7c30.png"
          alt="Man t-shirt product image"
        >
        <h3 id="product-1-name">Man T-shirt</h3>
        <p><span id="price-label-1">Price</span> $30</p>
      </article>
      <article class="card clickable product-card" data-product-key="product2" title="Click to add to cart">
        <img
          class="card-image"
          src="C:/Users/laksh/.cursor/projects/c-Users-laksh-Downloads-Telegram-Desktop/assets/c__Users_laksh_AppData_Roaming_Cursor_User_workspaceStorage_131e938d741c375358ff56a21e8dd05a_images_Untitled1-33ef54a0-5802-4204-8306-64568f2d7c30.png"
          alt="Man shirt product image"
        >
        <h3 id="product-2-name">Man-shirt</h3>
        <p><span id="price-label-2">Price</span> $30</p>
      </article>
      <article class="card clickable product-card" data-product-key="product3" title="Click to add to cart">
        <img
          class="card-image"
          src="C:/Users/laksh/.cursor/projects/c-Users-laksh-Downloads-Telegram-Desktop/assets/c__Users_laksh_AppData_Roaming_Cursor_User_workspaceStorage_131e938d741c375358ff56a21e8dd05a_images_Untitled-ec5ffc5f-99b7-49fd-a781-7759fcba47ce.png"
          alt="Woman scarf product image"
        >
        <h3 id="product-3-name">Woman Scart</h3>
        <p><span id="price-label-3">Price</span> $30</p>
      </article>
    </div>
  </section>

  <script>
    const translations = {
      en: {
        bestSellers: "Best Sellers",
        giftIdeas: "Gift Ideas",
        newReleases: "New Releases",
        todaysDeals: "Today's Deals",
        customerService: "Customer Service",
        allCategory: "All Category",
        searchPlaceholder: "Search this blog",
        cartLabel: "Cart",
        cartPanelTitle: "Ordered Items",
        cartEmpty: "Your cart is empty.",
        clearCart: "Clear Cart",
        qtyLabel: "Qty",
        heroTitle: "Get Start<br>Your Favorite Shopping",
        buyNow: "BUY NOW",
        productsTitle: "Man & Woman Fashion",
        product1: "Man T-shirt",
        product2: "Man-shirt",
        product3: "Woman Scart",
        price: "Price"
      },
      es: {
        bestSellers: "Mas Vendidos",
        giftIdeas: "Ideas de Regalo",
        newReleases: "Nuevos Lanzamientos",
        todaysDeals: "Ofertas de Hoy",
        customerService: "Atencion al Cliente",
        allCategory: "Todas las Categorias",
        searchPlaceholder: "Buscar en este blog",
        cartLabel: "Carrito",
        cartPanelTitle: "Articulos Pedidos",
        cartEmpty: "Tu carrito esta vacio.",
        clearCart: "Vaciar Carrito",
        qtyLabel: "Cant",
        heroTitle: "Empieza<br>Tus Compras Favoritas",
        buyNow: "COMPRAR AHORA",
        productsTitle: "Moda para Hombre y Mujer",
        product1: "Camiseta de Hombre",
        product2: "Camisa de Hombre",
        product3: "Panuelo de Mujer",
        price: "Precio"
      },
      de: {
        bestSellers: "Bestseller",
        giftIdeas: "Geschenkideen",
        newReleases: "Neuerscheinungen",
        todaysDeals: "Angebote des Tages",
        customerService: "Kundendienst",
        allCategory: "Alle Kategorien",
        searchPlaceholder: "In diesem Blog suchen",
        cartLabel: "Warenkorb",
        cartPanelTitle: "Bestellte Artikel",
        cartEmpty: "Dein Warenkorb ist leer.",
        clearCart: "Warenkorb Leeren",
        qtyLabel: "Menge",
        heroTitle: "Starte Jetzt<br>Dein Lieblingsshopping",
        buyNow: "JETZT KAUFEN",
        productsTitle: "Mode fur Herren und Damen",
        product1: "Herren T-Shirt",
        product2: "Herrenhemd",
        product3: "Damen Schal",
        price: "Preis"
      }
    };

    const languageSelect = document.getElementById("language-select");
    const navBestSellers = document.getElementById("nav-best-sellers");
    const navGiftIdeas = document.getElementById("nav-gift-ideas");
    const navNewReleases = document.getElementById("nav-new-releases");
    const navTodaysDeals = document.getElementById("nav-todays-deals");
    const navCustomerService = document.getElementById("nav-customer-service");
    const categoryBtn = document.getElementById("category-btn");
    const searchInput = document.getElementById("search-input");
    const cartBtn = document.getElementById("cart-btn");
    const heroTitle = document.getElementById("hero-title");
    const buyBtn = document.getElementById("buy-btn");
    const productsTitle = document.getElementById("products-title");
    const product1Name = document.getElementById("product-1-name");
    const product2Name = document.getElementById("product-2-name");
    const product3Name = document.getElementById("product-3-name");
    const priceLabel1 = document.getElementById("price-label-1");
    const priceLabel2 = document.getElementById("price-label-2");
    const priceLabel3 = document.getElementById("price-label-3");
    const productCards = document.querySelectorAll(".product-card");
    const cartPanel = document.getElementById("cart-panel");
    const cartPanelTitle = document.getElementById("cart-panel-title");
    const cartItemsList = document.getElementById("cart-items-list");
    const cartEmpty = document.getElementById("cart-empty");
    const clearCartBtn = document.getElementById("clear-cart-btn");
    let cartCount = 0;
    const cartItems = {
      product1: 0,
      product2: 0,
      product3: 0
    };

    function updateCartText() {
      const selectedLanguage = languageSelect.value;
      const t = translations[selectedLanguage] || translations.en;
      cartBtn.textContent = t.cartLabel + " (" + cartCount + ")";
    }

    function renderCartItems() {
      const selectedLanguage = languageSelect.value;
      const t = translations[selectedLanguage] || translations.en;
      cartPanelTitle.textContent = t.cartPanelTitle;
      cartEmpty.textContent = t.cartEmpty;
      clearCartBtn.textContent = t.clearCart;
      cartItemsList.innerHTML = "";

      const entries = Object.entries(cartItems).filter(function (entry) {
        return entry[1] > 0;
      });

      if (entries.length === 0) {
        cartEmpty.style.display = "block";
        return;
      }

      cartEmpty.style.display = "none";
      entries.forEach(function (entry) {
        const productKey = entry[0];
        const qty = entry[1];
        const item = document.createElement("li");
        item.textContent = t[productKey] + " - " + t.qtyLabel + ": " + qty;
        cartItemsList.appendChild(item);
      });
    }

    function applyLanguage(lang) {
      const t = translations[lang] || translations.en;
      document.documentElement.lang = lang;
      navBestSellers.textContent = t.bestSellers;
      navGiftIdeas.textContent = t.giftIdeas;
      navNewReleases.textContent = t.newReleases;
      navTodaysDeals.textContent = t.todaysDeals;
      navCustomerService.textContent = t.customerService;
      categoryBtn.textContent = t.allCategory;
      searchInput.placeholder = t.searchPlaceholder;
      updateCartText();
      heroTitle.innerHTML = t.heroTitle;
      buyBtn.textContent = t.buyNow;
      productsTitle.textContent = t.productsTitle;
      product1Name.textContent = t.product1;
      product2Name.textContent = t.product2;
      product3Name.textContent = t.product3;
      priceLabel1.textContent = t.price;
      priceLabel2.textContent = t.price;
      priceLabel3.textContent = t.price;
      renderCartItems();
    }

    languageSelect.addEventListener("change", function () {
      applyLanguage(this.value);
    });

    cartBtn.addEventListener("click", function () {
      renderCartItems();
      cartPanel.classList.add("open");
    });

    document.addEventListener("click", function (event) {
      const clickedInsideCart = cartPanel.contains(event.target);
      const clickedCartButton = cartBtn.contains(event.target);
      if (!clickedInsideCart && !clickedCartButton) {
        cartPanel.classList.remove("open");
      }
    });

    productCards.forEach(function (card) {
      card.addEventListener("click", function () {
        const productKey = card.dataset.productKey;
        cartItems[productKey] += 1;
        cartCount += 1;
        updateCartText();
        renderCartItems();
        cartPanel.classList.add("open");
      });
    });

    clearCartBtn.addEventListener("click", function () {
      cartItems.product1 = 0;
      cartItems.product2 = 0;
      cartItems.product3 = 0;
      cartCount = 0;
      updateCartText();
      renderCartItems();
    });

    applyLanguage(languageSelect.value);
  </script>
</body>
</html>
